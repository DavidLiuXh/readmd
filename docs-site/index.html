<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadMD</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f6f8fa;
      color: #1f2328;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d8dee4;
      max-width: 480px;
    }
    h1 { font-size: 32px; margin-bottom: 12px; }
    p { color: #656d76; margin-bottom: 24px; line-height: 1.6; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      padding: 8px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .primary { background: #0969da; color: #fff; }
    .secondary { background: #f6f8fa; color: #1f2328; border: 1px solid #d8dee4; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📖 ReadMD</h1>
    <p>A Chrome extension for reading local Markdown files beautifully — with directory tree, split view, dark mode, syntax highlighting, and more.</p>
    <div class="links">
      <a class="primary" href="https://github.com/DavidLiuXh/readmd">GitHub</a>
      <a class="secondary" href="/readmd/privacy/">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
